# CrimeLens AI — Machine Learning Model Registry Configurations

active_model: "minilm"

providers:
  minilm:
    model_name: "all-MiniLM-L6-v2"
    dimension: 384
    provider_type: "sentence_transformers"
    prefix: ""
    normalize: true
    mock_mode: false
    model_version: "1.0.0"
    feature_version: "1.0.0"
    pipeline_version: "1.0.0"

  bge:
    model_name: "BAAI/bge-small-en-v1.5"
    dimension: 384
    provider_type: "sentence_transformers"
    prefix: "Represent this sentence for searching relevant passages: "
    normalize: true
    mock_mode: false
    model_version: "1.5.0"
    feature_version: "1.0.0"
    pipeline_version: "1.0.0"

  e5:
    model_name: "intfloat/e5-base"
    dimension: 768
    provider_type: "sentence_transformers"
    prefix: "query: "
    normalize: true
    mock_mode: false
    model_version: "2.0.0"
    feature_version: "1.0.0"
    pipeline_version: "1.0.0"
