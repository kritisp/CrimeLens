services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crimelens_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/.env:/app/.env
    environment:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG
      - LOG_JSON=false
      - CORS_ORIGINS=["http://localhost:5173"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: always

  frontend:
    image: node:20-slim
    container_name: crimelens_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: always
