name: Deploy to Zoho Catalyst
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Catalyst CLI
        run: npm install -g zcatalyst-cli

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy to Catalyst
        run: |
          catalyst deploy --only client,appsail --project "${{ secrets.CATALYST_PROJECT }}" --org "${{ secrets.CATALYST_ORG }}" --dc "${{ secrets.CATALYST_DC || 'in' }}" --token "${{ secrets.CATALYST_TOKEN }}"
